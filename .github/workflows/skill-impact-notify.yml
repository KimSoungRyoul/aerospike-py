name: Skill Impact Notify
# Automatically creates a review issue in project-hub when skill-impacting files are changed on main merge
run-name: "Skill Impact: ${{ github.event.head_commit.message }}"

on:
  push:
    branches: [main]
    paths:
      - 'src/aerospike_py/__init__.pyi'
      - 'src/aerospike_py/exception.py'
      - 'src/aerospike_py/exception.pyi'
      - 'src/aerospike_py/types.py'
      - 'src/aerospike_py/list_operations.py'
      - 'src/aerospike_py/map_operations.py'
      - 'src/aerospike_py/exp.py'
      - 'rust/src/errors.rs'
      - 'rust/src/lib.rs'

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
      HUB_REPO: aerospike-ce-ecosystem/project-hub
      SOURCE_REPO: aerospike-py
      COMMIT_SHA: ${{ github.sha }}
      COMMIT_MSG: ${{ github.event.head_commit.message }}
    steps:
      - name: Detect affected skills and create hub issue
        run: |
          set -euo pipefail

          echo "=== Step 1: Get changed files ==="
          CHANGED_FILES=$(gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}" \
            --jq '[.files[].filename] | join("\n")')
          echo "Changed files:"
          echo "${CHANGED_FILES}"

          echo "=== Step 2: Map files to affected skills ==="
          AFFECTED_SKILLS=""
          AFFECTED_FILES=""

          # File-to-skill mapping for aerospike-py
          while IFS= read -r file; do
            case "${file}" in
              src/aerospike_py/__init__.pyi)
                AFFECTED_SKILLS="${AFFECTED_SKILLS}aerospike-py-api\n"
                AFFECTED_FILES="${AFFECTED_FILES}- \`${file}\` → **aerospike-py-api** (API signatures, return types, constants)\n"
                ;;
              src/aerospike_py/exception.py|src/aerospike_py/exception.pyi)
                AFFECTED_SKILLS="${AFFECTED_SKILLS}aerospike-py-api\naerospike-py-fastapi\n"
                AFFECTED_FILES="${AFFECTED_FILES}- \`${file}\` → **aerospike-py-api**, **aerospike-py-fastapi** (exception types)\n"
                ;;
              rust/src/errors.rs)
                AFFECTED_SKILLS="${AFFECTED_SKILLS}aerospike-py-api\naerospike-py-fastapi\n"
                AFFECTED_FILES="${AFFECTED_FILES}- \`${file}\` → **aerospike-py-api**, **aerospike-py-fastapi** (exception hierarchy, HTTP mapping)\n"
                ;;
              src/aerospike_py/list_operations.py)
                AFFECTED_SKILLS="${AFFECTED_SKILLS}aerospike-py-api\n"
                AFFECTED_FILES="${AFFECTED_FILES}- \`${file}\` → **aerospike-py-api** (List CDT operations)\n"
                ;;
              src/aerospike_py/map_operations.py)
                AFFECTED_SKILLS="${AFFECTED_SKILLS}aerospike-py-api\n"
                AFFECTED_FILES="${AFFECTED_FILES}- \`${file}\` → **aerospike-py-api** (Map CDT operations)\n"
                ;;
              src/aerospike_py/exp.py)
                AFFECTED_SKILLS="${AFFECTED_SKILLS}aerospike-py-api\n"
                AFFECTED_FILES="${AFFECTED_FILES}- \`${file}\` → **aerospike-py-api** (Expression filters)\n"
                ;;
              src/aerospike_py/types.py)
                AFFECTED_SKILLS="${AFFECTED_SKILLS}aerospike-py-api\naerospike-py-fastapi\n"
                AFFECTED_FILES="${AFFECTED_FILES}- \`${file}\` → **aerospike-py-api**, **aerospike-py-fastapi** (return types)\n"
                ;;
              rust/src/lib.rs)
                AFFECTED_SKILLS="${AFFECTED_SKILLS}aerospike-py-api\n"
                AFFECTED_FILES="${AFFECTED_FILES}- \`${file}\` → **aerospike-py-api** (module exports)\n"
                ;;
            esac
          done <<< "${CHANGED_FILES}"

          # Deduplicate skills
          UNIQUE_SKILLS=$(echo -e "${AFFECTED_SKILLS}" | sort -u | grep -v '^$' | paste -sd ',' -)

          if [ -z "${UNIQUE_SKILLS}" ]; then
            echo "No skill-impacting files changed. Skipping."
            exit 0
          fi

          echo "Affected skills: ${UNIQUE_SKILLS}"

          echo "=== Step 3: Create hub issue ==="
          # Truncate commit message to first line
          COMMIT_TITLE=$(echo "${COMMIT_MSG}" | head -1)

          ISSUE_BODY=$(cat <<ISSUEEOF
          ## Skill Impact Review

          **Source**: \`${SOURCE_REPO}\` ([commit ${COMMIT_SHA:0:7}](https://github.com/${{ github.repository }}/commit/${COMMIT_SHA}))
          **Commit**: ${COMMIT_TITLE}
          **Affected skills**: ${UNIQUE_SKILLS}

          ### Changed Files → Skill Mapping

          $(echo -e "${AFFECTED_FILES}")

          ### Next Steps
          1. The \`skill-impact-review\` label is automatically applied so the Hub Planner analyzes the diff
          2. After reviewing the analysis, add the \`start-implement\` label to auto-dispatch to the plugins repo

          ---
          > This issue was automatically created by the skill-impact-notify workflow in ${SOURCE_REPO}.
          ISSUEEOF
          )

          # Idempotently ensure required labels exist on the target repo
          # before creating the issue. `gh issue create --label X` fails
          # the whole workflow if a label is missing, so a manual delete
          # in the target repo would otherwise break this notifier.
          ensure_label() {
            gh label create "$1" \
              --repo "${HUB_REPO}" \
              --description "$2" \
              --color "$3" 2>/dev/null || true
          }
          ensure_label "skill-impact-review" "Skill impact review — Hub Planner analyzes upstream diff" "D93F0B"
          ensure_label "cross-repo"          "Tracks impact across multiple repos"                       "5319E7"

          gh issue create \
            --repo "${HUB_REPO}" \
            --title "[Skill Impact] ${SOURCE_REPO}: ${COMMIT_TITLE}" \
            --body "${ISSUE_BODY}" \
            --label "skill-impact-review" \
            --label "cross-repo"

          echo "=== Done ==="
